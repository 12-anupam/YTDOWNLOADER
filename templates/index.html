<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        button:hover {
            background-color: #cc0000;
        }
        input, select {
            padding: 8px;
            margin: 10px;
            width: 80%;
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .error-message {
            color: red;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Download YouTube Videos</h1>

    <!-- Google Login Button -->
    <a href="/login">
        <button>Login with Google</button>
    </a>

    <form id="downloadForm" method="POST">
        <label for="url">YouTube Video URL:</label><br>
        <input type="text" id="url" name="url" placeholder="Enter video URL" required><br>

        <label for="quality">Quality:</label><br>
        <select id="quality" name="quality">
            <option value="bestvideo+bestaudio/best">Best</option>
            <option value="18">360p</option>
            <option value="22">720p</option>
            <option value="137">1080p</option>
        </select><br>

        <button type="submit">Download</button>
    </form>
    
    <p class="error-message" id="error-message"></p>

    <script>
        document.getElementById('downloadForm').onsubmit = async function(e) {
            e.preventDefault();
            document.getElementById('error-message').style.display = 'none';
            const formData = new FormData(this);
            try {
                const response = await fetch("/", { method: "POST", body: formData });
                const data = await response.json();
                if (data.success) {
                    window.location.href = "/download/" + data.file_name;
                } else {
                    document.getElementById('error-message').textContent = "Error: " + data.error;
                    document.getElementById('error-message').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error-message').textContent = "An unexpected error occurred.";
                document.getElementById('error-message').style.display = 'block';
            }
        };
    </script>
</body>
</html>
